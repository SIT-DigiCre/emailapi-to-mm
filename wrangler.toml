name = "emailapi-to-mm"
main = "build/index.js"
compatibility_date = "2026-05-03"
preview_urls = false

[observability]
enabled = false
head_sampling_rate = 1

[observability.logs]
enabled = true
head_sampling_rate = 1
persist = true
invocation_logs = true

[observability.traces]
enabled = false
persist = true
head_sampling_rate = 1

[build]
command = "worker-build --release"
